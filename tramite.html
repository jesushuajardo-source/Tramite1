<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de partes virtual - gob.pe</title>
    <link rel="stylesheet" href="tramite.css">
</head>

<body>
    <header>
        <div class="logo-section">
            <span class="logo-text">gob. 
                <span class="logo-dot-pe">pe</span>
            </span> 
        </div>

        <div class="app-title">Mesa de partes virtual</div>
    </header>

    <div class="container"> <!--Class sirve para darle estilos-->
        <!--Screen 1: consultar estado del tramite--> 
        <section id="screen-status" class="screen active"> <!--El id se usa para identificarlo en el js-->
            <h2>Consultar Estado del Tramite</h2>
            <p class="screen-description">Al realizar un tramite de alguna oficina del estado, puedes realizar el seguimiento y obtener el reporte actual de un tramite administrativo.</p>
            
            <div class="form-group">
                <label for="doc-type"> Seleccione una entidad para su procedimiento </label>
                <select id="doc-type">
                    <option>Reniec - Registro Nacional de identificacion y Estado Civil</option>
                </select>
            </div>

            <div class="form-group">
                <label for ="doc-number"> nUmero de documento </label>
                <input type="text" id="doc-number" placeholder="Ingrese su numero de documento"> 
            </div>


            <div class="flex-end">
                <button class="btn btn-primary" onclick="showScreen('validation')" ></button> 
            </div>

        </section>




    <script src="tramite.js"></script> 



</body>

<footer class="main-footer">
    &copy; 2026 Registro Nacional de Identificación de estado civil
</footer>

</html>
